name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: |
          supabase functions deploy \
            add-items-to-order \
            cash-report \
            confirm-order \
            create-attendant-order \
            create-public-order \
            get-public-order-status \
            manage-users \
            mark-payment \
            reprint-order \
            send-whatsapp \
            test-printer \
            update-order-status \
            webauthn \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
