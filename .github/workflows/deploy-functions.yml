name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate project ref
        run: |
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_ID }}"
          echo "Ref length: ${#PROJECT_REF}"
          echo "Ref matches format: $(echo "$PROJECT_REF" | grep -cP '^[a-z0-9]{20}$' || echo 0)"

      - name: Deploy all Edge Functions
        run: |
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_ID }}"
          for fn in add-items-to-order cash-report confirm-order create-attendant-order create-public-order get-public-order-status manage-users mark-payment reprint-order send-whatsapp test-printer update-order-status webauthn; do
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
          done
