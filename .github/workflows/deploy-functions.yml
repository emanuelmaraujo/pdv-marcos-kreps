name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate project ref
        run: |
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_ID }}"
          echo "Ref length: ${#PROJECT_REF}"
          echo "Ref matches format: $(echo "$PROJECT_REF" | grep -cP '^[a-z0-9]{20}$' || echo 0)"

      - name: Apply pending migrations
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
          supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy authenticated Edge Functions
        run: |
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_ID }}"
          for fn in \
            add-items-to-order \
            cash-report \
            change-payment-method \
            confirm-order \
            create-attendant-order \
            edit-order-item \
            get-customer-profile \
            manage-users \
            mark-payment \
            reprint-order \
            test-printer \
            update-order-status; do
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
          done

      - name: Deploy public Edge Functions (JWT verification disabled)
        run: |
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_ID }}"
          for fn in \
            create-public-order \
            create-mercado-pago-payment \
            get-public-order-status \
            get-public-checkout-config \
            mercado-pago-webhook \
            webauthn \
            expire-pending-public-orders \
            send-whatsapp \
            whatsapp-webhook; do
            supabase functions deploy "$fn" \
              --project-ref "$PROJECT_REF" \
              --no-verify-jwt
          done
